<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Pet</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <script src="assets/js/index.js" type="module"></script>
  </head>
  <body>
    <h2>Virtual Pet: <span id="status">OFFLINE</span></h2>

    <div class="container">
      <section id="stats">
        <div>
          <img src="assets/img/health.png" width="32" height="30" />
          <span id="health">???</span>
        </div>
        <div>
          <img src="assets/img/apple.png" width="32" height="32" />
          <span id="hunger">???</span>
        </div>
        <div>
          <img src="assets/img/smile.png" width="32" height="30" />
          <span id="fun">???</span>
        </div>
        <div>
          <img src="assets/img/energy.png" width="32" height="32" />
          <span id="energy">???</span>
        </div>
      </section>

      <canvas id="screen" width="48" height="48"></canvas>

      <section id="buttons">
        <button id="eat">EAT</button>
        <button id="play">PLAY</button>
        <button id="sleep">SLEEP</button>
      </section>
    </div>
  </body>
</html>
